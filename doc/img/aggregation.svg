<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="system-ui, -apple-system, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="480" fill="#fcfcfb"/>
  <text x="20" y="30" font-size="15" font-weight="700" fill="#1b1b1b">データベース集約戦略（database/postgresql.py: AGGREGATION_LEVELS）</text>

  <!-- period axis -->
  <text x="20" y="66" font-size="12" fill="#52514e">グラフの要求期間に応じて参照テーブルを自動選択:</text>
  <line x1="60" y1="150" x2="920" y2="150" stroke="#c3c2b7" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="920" y="170" text-anchor="end" font-size="11" fill="#898781">要求期間（日）</text>
  <text x="60" y="170" font-size="11" fill="#898781">0</text>
  <text x="345" y="170" font-size="11" fill="#898781">14 日</text>
  <text x="630" y="170" font-size="11" fill="#898781">90 日</text>

  <rect x="60" y="90" width="285" height="44" rx="6" fill="#2a78d6"/>
  <text x="202" y="109" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">meteorological_data（生データ）</text>
  <text x="202" y="125" text-anchor="middle" font-size="10.5" fill="#ffffff">全観測点・品質フィルタ適用・上限 50 万行</text>

  <rect x="349" y="90" width="281" height="44" rx="6" fill="#1baf7a"/>
  <text x="489" y="109" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">halfhourly_altitude_grid</text>
  <text x="489" y="125" text-anchor="middle" font-size="10.5" fill="#ffffff">30 分 × 250m 帯の代表点</text>

  <rect x="634" y="90" width="286" height="44" rx="6" fill="#4a3aa7"/>
  <text x="777" y="109" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">threehour_altitude_grid</text>
  <text x="777" y="125" text-anchor="middle" font-size="10.5" fill="#ffffff">3 時間 × 250m 帯の代表点</text>

  <text x="60" y="200" font-size="11" fill="#52514e">・集約テーブルは平均ではなく「各バケットの実観測点 1 つ（DISTINCT ON, 最新優先）」を保持し、描画品質を維持</text>
  <text x="60" y="218" font-size="11" fill="#52514e">・品質フィルタは全レベル共通: distance ≤ 100km, temperature &gt; 閾値, 高度 0〜13,000m（期間 14 日境界で表示が不連続にならない）</text>
  <text x="60" y="236" font-size="11" fill="#52514e">・バケット境界は JST（Asia/Tokyo）基準。time カラムは TIMESTAMPTZ</text>
  <text x="60" y="254" font-size="11" fill="#52514e">・集約テーブルが空/エラー時は生データへフォールバック（LIMIT 付き）</text>

  <!-- incremental refresh -->
  <text x="20" y="300" font-size="14" font-weight="700" fill="#1b1b1b">増分更新（30 分毎・全履歴の再計算なし）</text>

  <line x1="60" y1="390" x2="920" y2="390" stroke="#c3c2b7" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="920" y="410" text-anchor="end" font-size="11" fill="#898781">時刻</text>
  <text x="870" y="378" text-anchor="middle" font-size="11" fill="#52514e">現在</text>
  <line x1="870" y1="382" x2="870" y2="398" stroke="#52514e" stroke-width="2"/>

  <!-- old data untouched -->
  <rect x="60" y="330" width="500" height="26" rx="4" fill="#e1e0d9"/>
  <text x="310" y="347" text-anchor="middle" font-size="11" fill="#52514e">過去分は再計算しない（確定済み）</text>

  <!-- halfhourly window -->
  <rect x="700" y="330" width="170" height="26" rx="4" fill="#1baf7a"/>
  <text x="785" y="347" text-anchor="middle" font-size="11" fill="#ffffff">直近 3 時間を DELETE → INSERT</text>
  <text x="785" y="320" text-anchor="middle" font-size="10.5" fill="#52514e">halfhourly_altitude_grid</text>

  <!-- threehour window -->
  <rect x="560" y="410" width="310" height="26" rx="4" fill="#4a3aa7"/>
  <text x="715" y="427" text-anchor="middle" font-size="11" fill="#ffffff">直近 12 時間を DELETE → INSERT</text>
  <text x="715" y="456" text-anchor="middle" font-size="10.5" fill="#52514e">threehour_altitude_grid</text>

  <text x="60" y="427" font-size="11" fill="#52514e">・窓はバケット境界に整列し 1 トランザクションで置換</text>
  <text x="60" y="445" font-size="11" fill="#52514e">・全量再構築は rebuild_aggregate_tables()（移行 SQL・テスト用）</text>
</svg>
