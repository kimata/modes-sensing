<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="system-ui, -apple-system, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="500" fill="#fcfcfb"/>

  <text x="20" y="30" font-size="15" font-weight="700" fill="#1b1b1b">システム全体構成</text>

  <!-- 航空機 -->
  <text x="20" y="66" font-size="13" fill="#52514e">✈ 航空機（1090MHz / 136MHz）</text>

  <!-- デコーダ -->
  <rect x="20" y="86" width="220" height="130" rx="8" fill="#eef1f5" stroke="#c3c2b7"/>
  <text x="130" y="106" text-anchor="middle" font-size="12" fill="#52514e">外部デコーダ（RTL-SDR ×2）</text>
  <rect x="35" y="116" width="190" height="40" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="130" y="133" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1b1b1b">dump1090-fa</text>
  <text x="130" y="148" text-anchor="middle" font-size="11" fill="#52514e">TCP :30002（raw 形式）</text>
  <rect x="35" y="164" width="190" height="40" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="130" y="181" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1b1b1b">dumpvdl2</text>
  <text x="130" y="196" text-anchor="middle" font-size="11" fill="#52514e">ZMQ PUB :5050（JSON）</text>
  <line x1="130" y1="72" x2="130" y2="86" stroke="#898781" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- collector -->
  <rect x="310" y="60" width="320" height="230" rx="8" fill="#e8f0fb" stroke="#2a78d6"/>
  <text x="470" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1b1b">収集プロセス amdar</text>
  <text x="470" y="97" text-anchor="middle" font-size="10.5" fill="#52514e">Deployment: modes-sensing-collector</text>
  <rect x="325" y="108" width="140" height="36" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="395" y="123" text-anchor="middle" font-size="11.5" fill="#1b1b1b">Mode S 受信スレッド</text>
  <text x="395" y="137" text-anchor="middle" font-size="10" fill="#52514e">sources/modes/receiver.py</text>
  <rect x="475" y="108" width="140" height="36" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="545" y="123" text-anchor="middle" font-size="11.5" fill="#1b1b1b">VDL2 受信スレッド</text>
  <text x="545" y="137" text-anchor="middle" font-size="10" fill="#52514e">sources/vdl2/receiver.py</text>
  <rect x="325" y="154" width="140" height="36" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="395" y="169" text-anchor="middle" font-size="11.5" fill="#1b1b1b">IntegratedBuffer</text>
  <text x="395" y="183" text-anchor="middle" font-size="10" fill="#52514e">高度補完（共有・ロック付き）</text>
  <rect x="475" y="154" width="140" height="36" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="545" y="169" text-anchor="middle" font-size="11.5" fill="#1b1b1b">OutlierDetector</text>
  <text x="545" y="183" text-anchor="middle" font-size="10" fill="#52514e">外れ値検出（共有・ロック付き）</text>
  <rect x="325" y="200" width="290" height="36" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="470" y="215" text-anchor="middle" font-size="11.5" fill="#1b1b1b">保存ワーカー store_queue（メインスレッド）</text>
  <text x="470" y="229" text-anchor="middle" font-size="10" fill="#52514e">database/postgresql.py</text>
  <text x="470" y="256" text-anchor="middle" font-size="10.5" fill="#52514e">multiprocessing.Queue で受信スレッドから集約</text>
  <text x="470" y="272" text-anchor="middle" font-size="10.5" fill="#52514e">healthz（liveness ファイル + Slack 通知）</text>

  <line x1="240" y1="136" x2="325" y2="126" stroke="#898781" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="240" y1="184" x2="475" y2="130" stroke="#898781" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- PostgreSQL -->
  <rect x="700" y="86" width="240" height="150" rx="8" fill="#fdf3dc" stroke="#eda100"/>
  <text x="820" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1b1b">PostgreSQL</text>
  <rect x="715" y="120" width="210" height="32" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="820" y="140" text-anchor="middle" font-size="11" fill="#1b1b1b">meteorological_data（TIMESTAMPTZ）</text>
  <rect x="715" y="158" width="210" height="30" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="820" y="177" text-anchor="middle" font-size="11" fill="#1b1b1b">halfhourly_altitude_grid</text>
  <rect x="715" y="194" width="210" height="30" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="820" y="213" text-anchor="middle" font-size="11" fill="#1b1b1b">threehour_altitude_grid</text>
  <line x1="630" y1="218" x2="700" y2="180" stroke="#898781" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="648" y="192" font-size="10" fill="#898781">INSERT</text>

  <!-- webui -->
  <rect x="310" y="340" width="320" height="130" rx="8" fill="#e6f6ef" stroke="#1baf7a"/>
  <text x="470" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1b1b">Web サーバー amdar-webui</text>
  <text x="470" y="377" text-anchor="middle" font-size="10.5" fill="#52514e">Deployment: modes-sensing-webui（Flask :5000, prefix /modes-sensing）</text>
  <rect x="325" y="388" width="140" height="34" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="395" y="402" text-anchor="middle" font-size="11" fill="#1b1b1b">グラフ生成 API</text>
  <text x="395" y="416" text-anchor="middle" font-size="10" fill="#52514e">ProcessPool + ジョブ管理</text>
  <rect x="475" y="388" width="140" height="34" rx="6" fill="#ffffff" stroke="#c3c2b7"/>
  <text x="545" y="402" text-anchor="middle" font-size="11" fill="#1b1b1b">画像キャッシュ</text>
  <text x="545" y="416" text-anchor="middle" font-size="10" fill="#52514e">ファイルベース（TTL 30分）</text>
  <text x="470" y="446" text-anchor="middle" font-size="10.5" fill="#52514e">React ビルドを同一オリジンで静的配信</text>

  <line x1="560" y1="340" x2="740" y2="240" stroke="#898781" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="640" y="286" font-size="10" fill="#898781">SELECT / 増分集約更新（30分毎）</text>

  <!-- ブラウザ -->
  <rect x="20" y="360" width="220" height="80" rx="8" fill="#ece9f7" stroke="#4a3aa7"/>
  <text x="130" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1b1b">ブラウザ（React SPA）</text>
  <text x="130" y="404" text-anchor="middle" font-size="10.5" fill="#52514e">frontend/src（Vite ビルド）</text>
  <text x="130" y="420" text-anchor="middle" font-size="10.5" fill="#52514e">HTTP + SSE（進捗はプッシュ受信）</text>
  <line x1="240" y1="400" x2="310" y2="400" stroke="#898781" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Prometheus -->
  <rect x="700" y="380" width="240" height="60" rx="8" fill="#ffffff" stroke="#c3c2b7" stroke-dasharray="5 4"/>
  <text x="820" y="404" text-anchor="middle" font-size="12" fill="#52514e">Prometheus 等（任意）</text>
  <text x="820" y="422" text-anchor="middle" font-size="10.5" fill="#898781">GET /modes-sensing/api/metrics</text>
  <line x1="700" y1="410" x2="630" y2="410" stroke="#898781" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ar)"/>
</svg>
