---
kind: Service
apiVersion: v1
metadata:
    name: modes-sensing-webui
    namespace: sensor
    annotations:
        metallb.universe.tf/address-pool: default
        external-dns.alpha.kubernetes.io/hostname: modes-sensing-webui.kubernetes.green-rabbit.net
spec:
    selector:
        app: modes-sensing-webui
    ports:
        - port: 5000
          targetPort: 5000
    type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: modes-sensing-collector
    namespace: sensor
    labels:
        app: modes-sensing-collector
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: modes-sensing-collector
    template:
        metadata:
            labels:
                app: modes-sensing-collector
        spec:
            containers:
                - name: modes-sensing-collector
                  image: gitlab.green-rabbit.net:5050/kimata/modes-sensing:latest
                  imagePullPolicy: Always
                  resources:
                      requests:
                          memory: 256Mi
                      limits:
                          memory: 512Mi
                  livenessProbe:
                      exec:
                          command:
                              - python
                              - -m
                              - amdar.cli.healthz
                              - -m
                              - COL
                      initialDelaySeconds: 120
                      periodSeconds: 60
                      timeoutSeconds: 5
                      successThreshold: 1
                      failureThreshold: 5

            imagePullSecrets:
                - name: gitlab-regcred

            dnsPolicy: Default

            nodeSelector:
                kubernetes.io/arch: amd64
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: modes-sensing-webui
    namespace: sensor
    labels:
        app: modes-sensing-webui
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: modes-sensing-webui
    template:
        metadata:
            labels:
                app: modes-sensing-webui
        spec:
            containers:
                - name: modes-sensing-webui
                  image: gitlab.green-rabbit.net:5050/kimata/modes-sensing:latest
                  imagePullPolicy: Always
                  command: ["python", "-m", "amdar.cli.webui"]
                  resources:
                      requests:
                          memory: 512Mi
                          cpu: 1000m
                      limits:
                          memory: 4Gi
                          cpu: 2000m

                  livenessProbe:
                      httpGet:
                          path: /modes-sensing/api/sysinfo
                          port: 5000
                      initialDelaySeconds: 120
                      periodSeconds: 120
                      timeoutSeconds: 30
                      successThreshold: 1
                      failureThreshold: 3

            dnsPolicy: Default

            imagePullSecrets:
                - name: gitlab-regcred
